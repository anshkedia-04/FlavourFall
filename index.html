function appReducer(state, action) {
  let next = state;
  switch (action.type) {
    // ORDERS
    case 'ADD_ORDER':
      next = { ...state, orders: [action.payload, ...state.orders] };
      break;
    case 'UPDATE_ORDER':
      next = { ...state, orders: state.orders.map(o => o.id === action.payload.id ? { ...o, ...action.payload } : o) };
      break;
    case 'DELETE_ORDER':
      next = { ...state, orders: state.orders.filter(o => o.id !== action.payload) };
      break;
    case 'ADVANCE_ORDER': {
      const flow = ['Pending','Preparing','Ready','Delivered'];
      next = { ...state, orders: state.orders.map(o => {
        if (o.id !== action.payload) return o;
        const idx = flow.indexOf(o.status);
        return idx < flow.length - 1 ? { ...o, status: flow[idx + 1] } : o;
      })};
      break;
    }
    // MENU
    case 'ADD_MENU': next = { ...state, menuItems: [action.payload, ...state.menuItems] }; break;
    case 'UPDATE_MENU': next = { ...state, menuItems: state.menuItems.map(m => m.id === action.payload.id ? { ...m, ...action.payload } : m) }; break;
    case 'DELETE_MENU': next = { ...state, menuItems: state.menuItems.filter(m => m.id !== action.payload) }; break;
    // INVENTORY
    case 'ADD_INVENTORY': next = { ...state, inventory: [action.payload, ...state.inventory] }; break;
    case 'UPDATE_INVENTORY': next = { ...state, inventory: state.inventory.map(i => i.id === action.payload.id ? { ...i, ...action.payload } : i) }; break;
    case 'DELETE_INVENTORY': next = { ...state, inventory: state.inventory.filter(i => i.id !== action.payload) }; break;
    case 'ADJUST_STOCK':
      next = { ...state, inventory: state.inventory.map(i => i.id === action.payload.id ? { ...i, stock: Math.max(0, i.stock + action.payload.delta) } : i) };
      break;
    // CUSTOMERS
    case 'ADD_CUSTOMER': next = { ...state, customers: [action.payload, ...state.customers] }; break;
    case 'UPDATE_CUSTOMER': next = { ...state, customers: state.customers.map(c => c.id === action.payload.id ? { ...c, ...action.payload } : c) }; break;
    case 'DELETE_CUSTOMER': next = { ...state, customers: state.customers.filter(c => c.id !== action.payload) }; break;
    case 'ADD_VISIT': next = { ...state, customers: state.customers.map(c => c.id === action.payload ? { ...c, visits: c.visits + 1, spend: c.spend + randomInt(150, 800), points: c.points + randomInt(10, 50) } : c) }; break;
    // STAFF
    case 'ADD_STAFF': next = { ...state, staff: [action.payload, ...state.staff] }; break;
    case 'UPDATE_STAFF': next = { ...state, staff: state.staff.map(s => s.id === action.payload.id ? { ...s, ...action.payload } : s) }; break;
    case 'DELETE_STAFF': next = { ...state, staff: state.staff.filter(s => s.id !== action.payload) }; break;
    case 'TOGGLE_ATTENDANCE': {
      const cycle = ['Present','Absent','Half Day'];
      next = { ...state, staff: state.staff.map(s => s.id === action.payload ? { ...s, attendance: cycle[(cycle.indexOf(s.attendance) + 1) % 3] } : s) };
      break;
    }
    // NOTIFICATIONS
    case 'ADD_NOTIFICATION': next = { ...state, notifications: [action.payload, ...state.notifications].slice(0, 50) }; break;
    case 'MARK_READ': next = { ...state, notifications: state.notifications.map(n => n.id === action.payload ? { ...n, read: true } : n) }; break;
    case 'MARK_ALL_READ': next = { ...state, notifications: state.notifications.map(n => ({ ...n, read: true })) }; break;
    case 'CLEAR_NOTIFICATIONS': next = { ...state, notifications: [] }; break;
    // SETTINGS
    case 'UPDATE_SETTINGS': next = { ...state, settings: { ...state.settings, ...action.payload } }; break;
    // TOASTS
    case 'ADD_TOAST': next = { ...state, toasts: [...state.toasts, action.payload] }; break;
    case 'REMOVE_TOAST': next = { ...state, toasts: state.toasts.filter(t => t.id !== action.payload) }; break;
    // DEMO
    case 'BULK_ADD_ORDERS': next = { ...state, orders: [...action.payload, ...state.orders] }; break;
    case 'BULK_ADD_CUSTOMERS': next = { ...state, customers: [...action.payload, ...state.customers] }; break;
    case 'RESTOCK_ALL':
      next = { ...state, inventory: state.inventory.map(i => ({ ...i, stock: i.reorder * randomInt(3, 8) })) };
      break;
    case 'RESET_DEMO':
      next = { orders: SEED_ORDERS, menuItems: SEED_MENU, inventory: SEED_INVENTORY, customers: SEED_CUSTOMERS, staff: SEED_STAFF, notifications: SEED_NOTIFICATIONS, settings: SEED_SETTINGS, toasts: [] };
      break;
    default: return state;
  }
  // Persist to localStorage
  const persist = ['orders','menuItems','inventory','customers','staff','notifications','settings'];
  persist.forEach(k => { if (next[k] !== state[k]) setLS('ff_' + (k === 'menuItems' ? 'menu' : k.replace('Items','')), next[k]); });
  if (next.settings !== state.settings) setLS('ff_settings', next.settings);
  return next;
}

function AppProvider({ children }) {
  const [state, dispatch] = useReducer(appReducer, initialState);

  const toast = useCallback((msg, type = 'success', duration = 3500) => {
    const id = Math.random().toString(36).slice(2);
    dispatch({ type: 'ADD_TOAST', payload: { id, msg, type } });
    setTimeout(() => dispatch({ type: 'REMOVE_TOAST', payload: id }), duration);
  }, []);

  const notify = useCallback((type, title, msg) => {
    const id = 'n' + Math.random().toString(36).slice(2);
    dispatch({ type: 'ADD_NOTIFICATION', payload: { id, type, title, msg, time: new Date().toISOString(), read: false } });
  }, []);

  return <AppContext.Provider value={{ state, dispatch, toast, notify }}>{children}</AppContext.Provider>;
}

// ─── DERIVED DATA HELPERS ─────────────────────────────────────────────────────
function useStats(state) {
  return useMemo(() => {
    const orders = state.orders;
    const delivered = orders.filter(o => o.status === 'Delivered');
    const revenue = delivered.reduce((s, o) => s + o.total, 0);
    const pending = orders.filter(o => o.status === 'Pending').length;
    const preparing = orders.filter(o => o.status === 'Preparing').length;
    const ready = orders.filter(o => o.status === 'Ready').length;
    const lowStock = state.inventory.filter(i => i.stock <= i.reorder).length;

    // Weekly revenue from last 7 days
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const weeklyData = days.map((day, di) => {
      const dayOrders = orders.filter(o => {
        const d = new Date(o.time);
        const diff = (new Date().getDay() - d.getDay() + 7) % 7;
        return diff === (new Date().getDay() - di + 7) % 7 && o.status === 'Delivered';
      });
      const rev = dayOrders.reduce((s, o) => s + o.total, 0);
      return { day, revenue: rev || randomInt(25000, 60000), orders: dayOrders.length || randomInt(180, 380) };
    });

    // Top products from order items
    const freq = {};
    orders.forEach(o => o.items.forEach(it => { freq[it.name] = (freq[it.name] || 0) + it.qty; }));
    const topProducts = Object.entries(freq).sort((a,b) => b[1]-a[1]).slice(0, 5).map(([name, sales], i) => ({
      name, sales, color: ['#09090b','#27272a','#52525b','#71717a','#a1a1aa'][i]
    }));

    return { totalOrders: orders.length, revenue, pending, preparing, ready, delivered: delivered.length, lowStock, weeklyData, topProducts };
  }, [state.orders, state.inventory]);
}

const GlobalSearch = ({ onNavigate }) => {
  const { state } = useApp();
  const [query, setQuery] = useState('');
  const [focused, setFocused] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => {
    const handler = (e) => { if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); inputRef.current?.focus(); } };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, []);

  const results = useMemo(() => {
    if (!query.trim()) return {};
    const q = query.toLowerCase();
    return {
      orders: state.orders.filter(o => o.id.toLowerCase().includes(q) || o.customer.toLowerCase().includes(q)).slice(0, 3),
      menu: state.menuItems.filter(m => m.name.toLowerCase().includes(q) || m.category.toLowerCase().includes(q)).slice(0, 3),
      customers: state.customers.filter(c => c.name.toLowerCase().includes(q) || c.phone.includes(q)).slice(0, 3),
      inventory: state.inventory.filter(i => i.item.toLowerCase().includes(q)).slice(0, 3),
    };
  }, [query, state]);

  const hasResults = query && Object.values(results).some(r => r.length > 0);
  const noResults = query && !hasResults;

  return (
    <div className="relative" onBlur={(e) => { if (!e.currentTarget.contains(e.relatedTarget)) setFocused(false); }}>
      <div className="relative flex items-center">
        <Icon name="Search" size={16} className="absolute left-3 text-gray-400" />
        <input ref={inputRef} type="text" value={query} onChange={e => setQuery(e.target.value)} onFocus={() => setFocused(true)}
          placeholder="Search... (Ctrl+K)"
          className="pl-9 pr-4 py-2 w-64 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:border-black focus:ring-2 focus:ring-black/10 focus:bg-white transition-all" />
        {query && <button onClick={() => setQuery('')} className="absolute right-3 text-gray-400 hover:text-gray-600"><Icon name="X" size={14} /></button>}
      </div>
      {(focused && (hasResults || noResults)) && (
        <div className="absolute top-11 left-0 w-[360px] bg-white rounded-2xl shadow-2xl border border-gray-100 z-50 overflow-hidden animate-fade-in">
          {noResults && <p className="p-4 text-center text-sm text-gray-400">No results for "{query}"</p>}
          {results.orders?.length > 0 && (
            <div>
              <div className="px-4 py-2 bg-gray-50 text-xs font-bold text-gray-500 uppercase tracking-wider">Orders</div>
              {results.orders.map(o => (
                <button key={o.id} onClick={() => { onNavigate('Orders'); setQuery(''); setFocused(false); }} className="w-full flex items-center justify-between px-4 py-3 hover:bg-zinc-100 transition-colors">
                  <span className="text-sm font-medium text-gray-800">{o.id} — {o.customer}</span>
                  <Badge status={o.status} />
                </button>
              ))}
            </div>
          )}
          {results.menu?.length > 0 && (
            <div>
              <div className="px-4 py-2 bg-gray-50 text-xs font-bold text-gray-500 uppercase tracking-wider">Menu</div>
              {results.menu.map(m => (
                <button key={m.id} onClick={() => { onNavigate('Menu'); setQuery(''); setFocused(false); }} className="w-full flex items-center justify-between px-4 py-3 hover:bg-zinc-100 transition-colors">
                  <span className="text-sm text-gray-800 flex items-center space-x-1.5"><Icon name={m.img} size={14} /><span>{m.name}</span></span>
                  <span className="text-sm font-bold text-zinc-950">{fmt(m.price)}</span>
                </button>
              ))}
            </div>
          )}
          {results.customers?.length > 0 && (
            <div>
              <div className="px-4 py-2 bg-gray-50 text-xs font-bold text-gray-500 uppercase tracking-wider">Customers</div>
              {results.customers.map(c => (
                <button key={c.id} onClick={() => { onNavigate('Customers'); setQuery(''); setFocused(false); }} className="w-full flex items-center space-x-3 px-4 py-3 hover:bg-zinc-100 transition-colors">
                  <div className="w-7 h-7 rounded-full bg-zinc-200 text-zinc-800 flex items-center justify-center text-xs font-bold">{initials(c.name)}</div>
                  <span className="text-sm text-gray-800">{c.name}</span>
                  <span className="text-xs text-gray-400">{c.phone}</span>
                </button>
              ))}
            </div>
          )}
          {results.inventory?.length > 0 && (
            <div>
              <div className="px-4 py-2 bg-gray-50 text-xs font-bold text-gray-500 uppercase tracking-wider">Inventory</div>
              {results.inventory.map(i => (
                <button key={i.id} onClick={() => { onNavigate('Inventory'); setQuery(''); setFocused(false); }} className="w-full flex items-center justify-between px-4 py-3 hover:bg-zinc-100 transition-colors">
                  <span className="text-sm text-gray-800">{i.item}</span>
                  <span className={`text-xs font-semibold ${i.stock <= i.reorder ? 'text-zinc-950 font-bold' : 'text-zinc-500'}`}>{i.stock} {i.unit}</span>
                </button>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
};

// ─── ORDERS MODULE ────────────────────────────────────────────────────────────
const OrderModal = ({ open, onClose, editOrder = null, onOrderCreated }) => {
  const { state, dispatch, toast, notify } = useApp();
  const [customer, setCustomer] = useState('');
  const [customerId, setCustomerId] = useState('');
  const [customerPhone, setCustomerPhone] = useState('');
  const [custSearch, setCustSearch] = useState('');
  const [showCustDrop, setShowCustDrop] = useState(false);
  const [itemSearch, setItemSearch] = useState('');
  const [selectedItems, setSelectedItems] = useState([]);
  const [method, setMethod] = useState('UPI');
  const [note, setNote] = useState('');
  const [status, setStatus] = useState('Pending');

  useEffect(() => {
    if (editOrder) {
      setCustomer(editOrder.customer); setCustomerId(editOrder.customerId); setCustSearch(editOrder.customer); setCustomerPhone(editOrder.customerPhone || '');
      setSelectedItems(editOrder.items.map(i => ({...i}))); setMethod(editOrder.method);
      setNote(editOrder.note || ''); setStatus(editOrder.status);
    } else {
      setCustomer(''); setCustomerId(''); setCustSearch(''); setCustomerPhone(''); setSelectedItems([]); setMethod('UPI'); setNote(''); setStatus('Preparing');
    }
    setItemSearch('');
    setShowCustDrop(false);
  }, [open, editOrder]);

  const gstRate = state.settings.gst / 100;
  const subtotal = selectedItems.reduce((s, i) => s + i.price * i.qty, 0);
  const gst = Math.round(subtotal * gstRate);
  const total = subtotal + gst;

  const addItem = (menuItem) => {
    setSelectedItems(prev => {
      const ex = prev.find(i => i.menuId === menuItem.id);
      if (ex) return prev.map(i => i.menuId === menuItem.id ? { ...i, qty: i.qty + 1 } : i);
      return [...prev, { menuId: menuItem.id, name: menuItem.name, price: menuItem.price, qty: 1 }];
    });
  };
  const setQty = (menuId, qty) => {
    if (qty < 1) { setSelectedItems(prev => prev.filter(i => i.menuId !== menuId)); return; }
    setSelectedItems(prev => prev.map(i => i.menuId === menuId ? { ...i, qty } : i));
  };

  const handleSubmit = () => {
    if (!customer || selectedItems.length === 0) { toast('Please fill all required fields', 'error'); return; }
    if (editOrder) {
      dispatch({ type: 'UPDATE_ORDER', payload: { ...editOrder, customer, customerId, customerPhone, items: selectedItems, subtotal, gst, total, method, note, status } });
      toast('Order updated successfully', 'success');
    } else {
      const newOrder = { id: uid(), customer, customerId, customerPhone, items: selectedItems, subtotal, gst, total, method, note, status: 'Preparing', time: new Date().toISOString() };
      dispatch({ type: 'ADD_ORDER', payload: newOrder });
      if (state.settings.notifyNewOrder) notify('order', 'New Order Received', `Order ${newOrder.id} from ${customer}`);
      toast(`Order ${newOrder.id} created!`, 'success');
      if (onOrderCreated) onOrderCreated(newOrder);
    }
    onClose();
  };

  const filteredMenu = state.menuItems.filter(m => m.available && (!itemSearch || m.name.toLowerCase().includes(itemSearch.toLowerCase()) || m.category.toLowerCase().includes(itemSearch.toLowerCase())));

  return (
    <Modal open={open} onClose={onClose} title={editOrder ? `Edit Order ${editOrder.id}` : 'Create New Order'} size="lg">
      <div className="p-6 space-y-5">
        <div className="grid grid-cols-3 gap-4">
          <div className="space-y-1 relative">
            <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide">Customer <span className="text-zinc-950 ml-1">*</span></label>
            <input type="text" value={custSearch} onChange={e => { setCustSearch(e.target.value); setShowCustDrop(true); setCustomer(e.target.value); setCustomerId(e.target.value.toLowerCase().replace(/\s/g,'')); }} onFocus={() => setShowCustDrop(true)} onBlur={() => setTimeout(() => setShowCustDrop(false), 200)} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-900 bg-white placeholder:text-gray-400 focus:border-black focus:ring-2 outline-none transition-all" placeholder="Search or type new..." />
            {showCustDrop && (
               <div className="absolute z-50 w-full mt-1 bg-white border border-gray-200 rounded-lg shadow-lg max-h-48 overflow-y-auto">
                 <button type="button" onMouseDown={() => { setCustomer('Walk-in Customer'); setCustomerId('walkin'); setCustomerPhone(''); setShowCustDrop(false); setCustSearch('Walk-in Customer'); }} className="w-full text-left px-3 py-2 text-sm text-gray-900 hover:bg-gray-100 font-medium border-b border-gray-100">Walk-in Customer</button>
                 {state.customers.filter(c => c.name.toLowerCase().includes(custSearch.toLowerCase())).map(c => (
                   <button key={c.id} type="button" onMouseDown={() => { setCustomer(c.name); setCustomerId(c.id); setCustomerPhone(c.phone || ''); setShowCustDrop(false); setCustSearch(c.name); }} className="w-full text-left px-3 py-2 text-sm text-gray-900 hover:bg-gray-100">{c.name}</button>
                 ))}
               </div>
            )}
          </div>
          <div className="space-y-1">
            <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide">Phone No.</label>
            <input type="tel" value={customerPhone} onChange={e => setCustomerPhone(e.target.value)} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-900 bg-white placeholder:text-gray-400 focus:border-black focus:ring-2 outline-none transition-all" placeholder="e.g. 9876543210" />
          </div>
          <Select label="Payment Method" value={method} onChange={e => setMethod(e.target.value)}>
            {PAYMENT_METHODS.map(m => <option key={m}>{m}</option>)}
          </Select>
        </div>

        <div className="space-y-2">
          <div className="flex items-center justify-between">
            <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide">Add Items <span className="text-zinc-950 ml-1">*</span></label>
            <div className="relative">
              <Icon name="Search" size={14} className="absolute left-2.5 top-2 text-gray-400" />
              <input type="text" placeholder="Search menu..." value={itemSearch} onChange={e => setItemSearch(e.target.value)} className="pl-8 pr-3 py-1.5 border border-gray-200 rounded-lg text-xs text-gray-900 bg-white outline-none w-48 focus:border-black focus:ring-1 focus:ring-black/10 transition-all" />
            </div>
          </div>
          <div className="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto pr-1">
            {filteredMenu.length === 0 ? <p className="text-sm text-gray-400 col-span-2 py-4 text-center">No items found.</p> : filteredMenu.map(m => (
              <button key={m.id} onClick={() => addItem(m)}
                className={`flex items-center justify-between p-3 rounded-lg border transition-all text-left ${selectedItems.find(i=>i.menuId===m.id) ? 'border-black bg-zinc-100 font-bold' : 'border-gray-200 hover:border-zinc-400 hover:bg-zinc-50'}`}>
                <div>
                  <div className="flex items-center space-x-1.5">
                    <Icon name={m.img} size={14} className="text-zinc-500" />
                    <p className="text-sm font-medium text-gray-800">{m.name}</p>
                  </div>
                  <p className="text-xs text-gray-400">{m.category}</p>
                </div>
                <span className="text-sm font-bold text-zinc-950">{fmt(m.price)}</span>
              </button>
            ))}
          </div>
        </div>

        {selectedItems.length > 0 && (
          <div className="space-y-2">
            <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide">Order Items</label>
            <div className="bg-gray-50 rounded-xl overflow-hidden">
              {selectedItems.map(item => (
                <div key={item.menuId} className="flex items-center justify-between px-4 py-3 border-b border-gray-100 last:border-0">
                  <span className="text-sm font-medium text-gray-800">{item.name}</span>
                  <div className="flex items-center space-x-3">
                    <div className="flex items-center space-x-2">
                      <button onClick={() => setQty(item.menuId, item.qty - 1)} className="w-7 h-7 rounded-full bg-gray-200 hover:bg-gray-300 flex items-center justify-center transition-colors"><Icon name="Minus" size={12} /></button>
                      <span className="text-sm font-bold w-4 text-center">{item.qty}</span>
                      <button onClick={() => setQty(item.menuId, item.qty + 1)} className="w-7 h-7 rounded-full bg-zinc-200 hover:bg-zinc-300 text-zinc-900 flex items-center justify-center transition-colors"><Icon name="Plus" size={12} /></button>
                    </div>
                    <span className="text-sm font-bold text-gray-900 w-20 text-right">{fmt(item.price * item.qty)}</span>
                  </div>
                </div>
              ))}
              <div className="px-4 py-3 space-y-1 bg-white border-t border-gray-200">
                <div className="flex justify-between text-sm text-gray-500"><span>Subtotal</span><span>{fmt(subtotal)}</span></div>
                <div className="flex justify-between text-sm text-gray-500"><span>GST ({state.settings.gst}%)</span><span>{fmt(gst)}</span></div>
                <div className="flex justify-between text-sm font-bold text-gray-900 pt-1 border-t border-gray-100"><span>Total</span><span className="text-zinc-950 text-base font-bold">{fmt(total)}</span></div>
              </div>
            </div>
          </div>
        )}

        <Input label="Special Note" placeholder="e.g. Less sugar, extra shot..." value={note} onChange={e => setNote(e.target.value)} />

        <div className="flex justify-end space-x-3 pt-2">
          <button onClick={onClose} className="px-5 py-2 text-sm font-medium text-gray-700 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors">Cancel</button>
          <button onClick={handleSubmit} className="px-5 py-2 text-sm font-medium text-white bg-black rounded-lg hover:bg-zinc-800 transition-colors shadow-sm">
            {editOrder ? 'Save Changes' : 'Place Order'}
          </button>
        </div>
      </div>
    </Modal>
  );
};

const OrdersView = () => {
  const { state, dispatch, toast } = useApp();
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('All');
  const [page, setPage] = useState(1);
  const [createOpen, setCreateOpen] = useState(false);
  const [editOrder, setEditOrder] = useState(null);
  const [deleteId, setDeleteId] = useState(null);
  const [activeInvoice, setActiveInvoice] = useState(null);
  const [loading, setLoading] = useState(true);
  const PER_PAGE = 10;

  useEffect(() => { const t = setTimeout(() => setLoading(false), 500); return () => clearTimeout(t); }, []);

  const filtered = useMemo(() => {
    const q = search.toLowerCase();
    return state.orders.filter(o =>
      (!q || o.id.toLowerCase().includes(q) || o.customer.toLowerCase().includes(q) || o.items.some(i => i.name.toLowerCase().includes(q))) &&
      (statusFilter === 'All' || o.status === statusFilter)
    );
  }, [state.orders, search, statusFilter]);

  const paginated = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);
  const counts = { All: state.orders.length, Pending: 0, Preparing: 0, Ready: 0, Delivered: 0 };
  state.orders.forEach(o => { if (counts[o.status] !== undefined) counts[o.status]++; });

  const handleDelete = (id) => { dispatch({ type: 'DELETE_ORDER', payload: id }); toast('Order deleted', 'info'); };
  const advanceStatus = (id) => { dispatch({ type: 'ADVANCE_ORDER', payload: id }); toast('Order status updated', 'success'); };

  const nextStatus = { Pending: 'Preparing', Preparing: 'Ready', Ready: 'Delivered' };
  const statusColors = { Pending: 'bg-zinc-50 text-zinc-500 border border-zinc-200', Preparing: 'bg-zinc-50 text-zinc-600 border border-zinc-200', Ready: 'bg-zinc-100 text-zinc-700 border border-zinc-200', Delivered: 'bg-zinc-100 text-zinc-900 border border-zinc-200' };

  return (
    <div className="space-y-6 animate-fade-in">
      <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
          <h1 className="text-2xl font-black text-gray-900">Order Management</h1>
          <p className="text-gray-400 text-sm mt-1">Track, manage and fulfil customer orders</p>
        </div>
        <button onClick={() => setCreateOpen(true)} className="flex items-center space-x-2 bg-black text-white px-5 py-2.5 rounded-xl font-semibold text-sm hover:bg-zinc-800 transition-all shadow-sm hover:shadow-md">
          <Icon name="Plus" size={18} /><span>New Order</span>
        </button>
      </div>

      {/* Summary Cards */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        {['Pending','Preparing','Ready','Delivered'].map(s => (
          <button key={s} onClick={() => { setStatusFilter(s === statusFilter ? 'All' : s); setPage(1); }}
            className={`p-4 rounded-xl border-2 transition-all text-left ${statusFilter === s ? 'border-black bg-zinc-100' : 'bg-white border-gray-100 hover:border-zinc-400'}`}>
            <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide">{s}</p>
            <p className="text-2xl font-black text-gray-900 mt-1">{counts[s]}</p>
          </button>
        ))}
      </div>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
        <div className="p-5 border-b border-gray-100 flex flex-col sm:flex-row sm:items-center gap-3">
          <div className="relative flex-1">
            <Icon name="Search" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
            <input type="text" value={search} onChange={e => { setSearch(e.target.value); setPage(1); }} placeholder="Search by order ID, customer, item..."
              className="pl-9 pr-4 py-2 w-full border border-gray-200 rounded-xl text-sm focus:border-black focus:ring-2 focus:ring-black/10 transition-all" />
          </div>
          <div className="flex space-x-2">
            {['All','Pending','Preparing','Ready','Delivered'].map(s => (
              <button key={s} onClick={() => { setStatusFilter(s); setPage(1); }}
                className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${statusFilter===s ? 'bg-black text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>{s}</button>
            ))}
          </div>
        </div>

        {loading ? <Skeleton /> : (
          <>
            {paginated.length === 0 ? (
              <EmptyState icon="ShoppingBag" title="No orders found" subtitle="Try changing the search or filter" cta="Create First Order" onCta={() => setCreateOpen(true)} />
            ) : (
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider border-b border-gray-100">
                      <th className="px-5 py-3.5 text-left font-semibold">Order</th>
                      <th className="px-5 py-3.5 text-left font-semibold">Customer</th>
                      <th className="px-5 py-3.5 text-left font-semibold">Items</th>
                      <th className="px-5 py-3.5 text-left font-semibold">Payment</th>
                      <th className="px-5 py-3.5 text-left font-semibold">Total</th>
                      <th className="px-5 py-3.5 text-left font-semibold">Status</th>
                      <th className="px-5 py-3.5 text-left font-semibold">Actions</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-50">
                    {paginated.map(order => (
                      <tr key={order.id} className="hover:bg-gray-50/50 transition-colors group">
                        <td className="px-5 py-4">
                          <span className="text-sm font-bold text-zinc-900">{order.id}</span>
                          <p className="text-[10px] text-gray-400 mt-0.5">{new Date(order.time).toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'})}</p>
                        </td>
                        <td className="px-5 py-4">
                          <div className="flex items-center space-x-2">
                            <div className="w-7 h-7 rounded-full bg-zinc-200 text-zinc-800 text-xs font-bold flex items-center justify-center shrink-0">{initials(order.customer)}</div>
                            <span className="text-sm font-medium text-gray-900">{order.customer}</span>
                          </div>
                        </td>
                        <td className="px-5 py-4 text-sm text-gray-500 max-w-[200px]">
                          <p className="truncate">{order.items.map(i => `${i.name}×${i.qty}`).join(', ')}</p>
                          {order.note && <p className="text-[10px] text-zinc-650 mt-0.5 italic">"{order.note}"</p>}
                        </td>
                        <td className="px-5 py-4"><span className="text-sm text-gray-600">{order.method}</span></td>
                        <td className="px-5 py-4"><span className="text-sm font-bold text-gray-900">{fmt(order.total)}</span></td>
                        <td className="px-5 py-4"><Badge status={order.status} /></td>
                        <td className="px-5 py-4">
                          <div className="flex items-center space-x-2">
                            {nextStatus[order.status] && (
                              <button onClick={() => advanceStatus(order.id)}
                                className="px-2.5 py-1 bg-zinc-200 text-zinc-900 text-xs font-semibold rounded-lg hover:bg-zinc-300 transition-colors whitespace-nowrap">
                                → {nextStatus[order.status]}
                              </button>
                            )}
                            <button onClick={() => setActiveInvoice(order)} className="p-1.5 text-zinc-700 bg-zinc-100 hover:text-black hover:bg-zinc-200 rounded-lg transition-colors"><Icon name="FileText" size={14} /></button>
                            <button onClick={() => setEditOrder(order)} className="p-1.5 text-zinc-700 bg-zinc-100 hover:text-black hover:bg-zinc-200 rounded-lg transition-colors"><Icon name="Pencil" size={14} /></button>
                            <button onClick={() => setDeleteId(order.id)} className="p-1.5 text-zinc-700 bg-zinc-100 hover:text-black hover:bg-zinc-200 rounded-lg transition-colors"><Icon name="Trash2" size={14} /></button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
            <Pagination total={filtered.length} page={page} perPage={PER_PAGE} onPage={setPage} />
          </>
        )}
      </div>

      <OrderModal open={createOpen || !!editOrder} onClose={() => { setCreateOpen(false); setEditOrder(null); }} editOrder={editOrder} onOrderCreated={order => setActiveInvoice(order)} />
      <InvoiceModal open={!!activeInvoice} onClose={() => setActiveInvoice(null)} order={activeInvoice} />
      <ConfirmModal open={!!deleteId} onClose={() => setDeleteId(null)} onConfirm={() => handleDelete(deleteId)} title="Delete Order" message={`Are you sure you want to delete order ${deleteId}? This action cannot be undone.`} />
    </div>
  );
};

// ─── MENU MODULE ──────────────────────────────────────────────────────────────
const MenuItemModal = ({ open, onClose, editItem = null }) => {
  const { dispatch, toast } = useApp();
  const icons = ['Coffee', 'Cake', 'Cookie', 'Utensils', 'GlassWater', 'ChefHat', 'ShoppingBag', 'Package'];
  const categories = ['Coffee','Cakes','Pastries','Snacks','Beverages'];
  const [form, setForm] = useState({ name:'', category:'Coffee', price:'', available:true, img:'Coffee', description:'', photo:'' });
  useEffect(() => { if (editItem) setForm({ ...editItem, price: String(editItem.price) }); else setForm({ name:'', category:'Coffee', price:'', available:true, img:'Coffee', description:'', photo:'' }); }, [open, editItem]);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const handleSubmit = () => {
    if (!form.name || !form.price) { toast('Name and price are required', 'error'); return; }
    const payload = { ...form, price: Number(form.price) };
    if (editItem) { dispatch({ type: 'UPDATE_MENU', payload: { ...editItem, ...payload } }); toast('Menu item updated', 'success'); }
    else { dispatch({ type: 'ADD_MENU', payload: { ...payload, id: 'm' + Date.now() } }); toast('Menu item added!', 'success'); }
    onClose();
  };
  return (
    <Modal open={open} onClose={onClose} title={editItem ? 'Edit Menu Item' : 'Add Menu Item'} size="md">
      <div className="p-6 space-y-4">
        <div className="space-y-3">
          <label className="block text-xs font-semibold text-gray-600 uppercase tracking-wide">Item Photo</label>
          <div className="flex items-center space-x-4">
            <div className="w-16 h-16 rounded-xl bg-zinc-100 flex items-center justify-center overflow-hidden border border-gray-200 shrink-0">
              {form.photo ? <img src={form.photo} alt="Preview" className="w-full h-full object-cover" /> : <Icon name="Image" size={24} className="text-gray-400" />}
            </div>
            <div className="flex-1 space-y-2">
              <input type="text" placeholder="Paste image URL here..." value={form.photo || ''} onChange={e => set('photo', e.target.value)} className="w-full px-3 py-1.5 text-sm text-gray-900 bg-white placeholder:text-gray-400 border border-gray-200 rounded-lg focus:ring-2 focus:ring-black focus:border-transparent outline-none transition-all" />
              <div className="flex items-center space-x-3">
                <span className="text-xs text-gray-400 font-medium">OR</span>
                <label className="cursor-pointer text-xs font-semibold px-3 py-1.5 bg-zinc-100 hover:bg-zinc-200 rounded-lg transition-colors inline-block text-zinc-800">
                  Upload from device
                  <input type="file" accept="image/*" className="hidden" onChange={e => {
                    const file = e.target.files[0];
                    if (file) {
                      const reader = new FileReader();
                      reader.onload = (ev) => set('photo', ev.target.result);
                      reader.readAsDataURL(file);
                    }
                  }} />
                </label>
              </div>
            </div>
          </div>
        </div>
        <Input label="Item Name" required value={form.name} onChange={e => set('name', e.target.value)} placeholder="e.g. Chocolate Latte" />
        <div className="grid grid-cols-2 gap-4">
          <Select label="Category" required value={form.category} onChange={e => set('category', e.target.value)}>{categories.map(c => <option key={c}>{c}</option>)}</Select>
          <Input label="Price (₹)" required type="number" value={form.price} onChange={e => set('price', e.target.value)} placeholder="e.g. 250" />
        </div>

const InventoryView = () => {
  const { state, dispatch, toast, notify } = useApp();
  const [search, setSearch] = useState('');
  const [addOpen, setAddOpen] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [deleteId, setDeleteId] = useState(null);
  const [adjustId, setAdjustId] = useState(null);
  const [adjustVal, setAdjustVal] = useState('');
  const [loading, setLoading] = useState(true);
  useEffect(() => { const t = setTimeout(() => setLoading(false), 400); return () => clearTimeout(t); }, []);

  const filtered = useMemo(() => {
    const q = search.toLowerCase();
    return state.inventory.filter(i => !q || i.item.toLowerCase().includes(q) || i.category?.toLowerCase().includes(q));
  }, [state.inventory, search]);

  const getStatus = (i) => i.stock === 0 ? 'Out of Stock' : i.stock <= i.reorder ? 'Low Stock' : 'In Stock';
  const stockPct = (i) => Math.min(100, (i.stock / (i.reorder * 4)) * 100);

  const handleAdjust = (id, delta) => {
    const item = state.inventory.find(i => i.id === id);
    const newStock = Math.max(0, item.stock + delta);
    dispatch({ type: 'ADJUST_STOCK', payload: { id, delta } });
    if (newStock <= item.reorder && item.stock > item.reorder) {
      if (state.settings.notifyLowStock) notify('stock', 'Low Stock Alert', `${item.item} is below reorder level`);
      toast(`${item.item} is now low on stock!`, 'warning');
    } else {
      toast(`Stock updated for ${item.item}`, 'success');
    }
    setAdjustId(null); setAdjustVal('');
  };

  return (
    <div className="space-y-6 animate-fade-in">
      <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div><h1 className="text-2xl font-black text-gray-900">Inventory Management</h1><p className="text-gray-400 text-sm mt-1">Track raw materials and supplies</p></div>
        <button onClick={() => setAddOpen(true)} className="flex items-center space-x-2 bg-black text-white px-5 py-2.5 rounded-xl font-semibold text-sm hover:bg-zinc-800 transition-all shadow-sm">
          <Icon name="Plus" size={18} /><span>Add Item</span>
        </button>
      </div>

      <div className="grid grid-cols-3 gap-4">
        {[
          { label:'Total Items', val: state.inventory.length, icon:'Package', color:'text-zinc-850 bg-zinc-100' },
          { label:'Low Stock', val: state.inventory.filter(i => i.stock > 0 && i.stock <= i.reorder).length, icon:'AlertTriangle', color:'text-zinc-900 bg-zinc-200' },
          { label:'Out of Stock', val: state.inventory.filter(i => i.stock === 0).length, icon:'XCircle', color:'text-zinc-50 bg-zinc-900' },
        ].map(c => (
          <div key={c.label} className="bg-white rounded-xl border border-gray-100 shadow-sm p-4 flex items-center space-x-3">
            <div className={`p-2.5 rounded-xl ${c.color}`}><Icon name={c.icon} size={20} /></div>
            <div><p className="text-xs text-gray-500 font-medium">{c.label}</p><p className="text-2xl font-black text-gray-900">{c.val}</p></div>
          </div>
        ))}
      </div>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
        <div className="p-5 border-b border-gray-100 flex items-center space-x-3">
          <div className="relative flex-1">
            <Icon name="Search" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search inventory..." className="pl-9 pr-4 py-2 w-full border border-gray-200 rounded-xl text-sm focus:border-black focus:ring-2 focus:ring-black/10 transition-all" />
          </div>
        </div>

        {loading ? <Skeleton /> : filtered.length === 0 ? <EmptyState icon="Package" title="No items found" subtitle="Add your first inventory item" cta="Add Item" onCta={() => setAddOpen(true)} /> : (
          <div className="overflow-x-auto">
            <table className="w-full">
              <thead>
                <tr className="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider border-b border-gray-100">
                  <th className="px-5 py-3.5 text-left font-semibold">Ingredient</th>
                  <th className="px-5 py-3.5 text-left font-semibold">Stock Level</th>
                  <th className="px-5 py-3.5 text-left font-semibold">Reorder At</th>
                  <th className="px-5 py-3.5 text-left font-semibold">Status</th>
                  <th className="px-5 py-3.5 text-left font-semibold">Adjust</th>
                  <th className="px-5 py-3.5 text-left font-semibold">Actions</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-50">
                {filtered.map(item => {
                  const status = getStatus(item);
                  const pct = stockPct(item);
                  return (
                    <tr key={item.id} className="hover:bg-gray-50/50 transition-colors">
                      <td className="px-5 py-4">
                        <p className="text-sm font-semibold text-gray-900">{item.item}</p>
                        <p className="text-xs text-gray-400">{item.category}</p>
                      </td>
                      <td className="px-5 py-4 min-w-[160px]">
                        <p className="text-sm font-bold text-gray-900 mb-1">{item.stock} {item.unit}</p>
                        <div className="w-32 bg-gray-100 rounded-full h-1.5">
                          <div className={`h-1.5 rounded-full transition-all duration-500 ${status === 'In Stock' ? 'bg-zinc-900' : status === 'Low Stock' ? 'bg-zinc-500' : 'bg-zinc-300'}`} style={{width:`${pct}%`}} />
                        </div>
                      </td>
                      <td className="px-5 py-4 text-sm text-gray-500">{item.reorder} {item.unit}</td>
                      <td className="px-5 py-4"><Badge status={status} /></td>
                      <td className="px-5 py-4">
                        {adjustId === item.id ? (
                          <div className="flex items-center space-x-2">
                            <input type="number" value={adjustVal} onChange={e => setAdjustVal(e.target.value)} placeholder="Qty" className="w-16 px-2 py-1 border border-gray-200 rounded-lg text-sm focus:border-black text-center" />
                            <button onClick={() => handleAdjust(item.id, Number(adjustVal))} className="px-2 py-1 bg-zinc-900 text-white text-xs rounded-lg">+Add</button>
                            <button onClick={() => handleAdjust(item.id, -Number(adjustVal))} className="px-2 py-1 bg-zinc-500 text-white text-xs rounded-lg">-Use</button>
                            <button onClick={() => {setAdjustId(null); setAdjustVal('');}} className="text-gray-400"><Icon name="X" size={14} /></button>
                          </div>
                        ) : (
                          <button onClick={() => setAdjustId(item.id)} className="px-3 py-1.5 bg-zinc-100 hover:bg-zinc-200 hover:text-zinc-950 text-zinc-650 text-xs font-semibold rounded-lg transition-colors">Adjust Stock</button>
                        )}
                      </td>
                      <td className="px-5 py-4">
                        <div className="flex space-x-1">
                          <button onClick={() => setEditItem(item)} className="p-1.5 text-zinc-700 bg-zinc-100 hover:text-black hover:bg-zinc-200 rounded-lg transition-colors"><Icon name="Pencil" size={14} /></button>
                          <button onClick={() => setDeleteId(item.id)} className="p-1.5 text-zinc-700 bg-zinc-100 hover:text-black hover:bg-zinc-200 rounded-lg transition-colors"><Icon name="Trash2" size={14} /></button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      <InventoryModal open={addOpen || !!editItem} onClose={() => { setAddOpen(false); setEditItem(null); }} editItem={editItem} />
      <ConfirmModal open={!!deleteId} onClose={() => setDeleteId(null)} onConfirm={() => { dispatch({ type: 'DELETE_INVENTORY', payload: deleteId }); toast('Inventory item removed', 'info'); }} title="Remove Item" message="Remove this item from inventory?" />
    </div>
  );
};

const StaffModal = ({ open, onClose, editStaff = null }) => {
  const { dispatch, toast } = useApp();
  const [form, setForm] = useState({ name:'', role:'Barista', contact:'', email:'', shift:'Morning' });
  useEffect(() => { if (editStaff) setForm({ name:editStaff.name, role:editStaff.role, contact:editStaff.contact, email:editStaff.email||'', shift:editStaff.shift }); else setForm({ name:'', role:'Barista', contact:'', email:'', shift:'Morning' }); }, [open, editStaff]);
  const set = (k,v) => setForm(f => ({...f,[k]:v}));
  const handleSubmit = () => {
    if (!form.name || !form.contact) { toast('Name and contact are required', 'error'); return; }
    if (editStaff) { dispatch({ type: 'UPDATE_STAFF', payload: { ...editStaff, ...form } }); toast('Employee updated', 'success'); }
    else { dispatch({ type: 'ADD_STAFF', payload: { ...form, id: 's' + Date.now(), attendance: 'Present', joinDate: new Date().toISOString().slice(0,10) } }); toast('Employee added', 'success'); }
    onClose();
  };
  return (
    <Modal open={open} onClose={onClose} title={editStaff ? 'Edit Employee' : 'Add Employee'} size="sm">
      <div className="p-6 space-y-4">
        <Input label="Full Name" required value={form.name} onChange={e => set('name', e.target.value)} placeholder="e.g. Riya Sharma" />
        <div className="grid grid-cols-2 gap-3">
          <Select label="Role" value={form.role} onChange={e => set('role', e.target.value)}>
            {['Manager','Cashier','Barista','Head Baker','Chef','Waiter','Delivery','Cleaner'].map(r => <option key={r}>{r}</option>)}
          </Select>
          <Select label="Shift" value={form.shift} onChange={e => set('shift', e.target.value)}>
            {['Morning','Afternoon','Evening','Night'].map(s => <option key={s}>{s}</option>)}
          </Select>
        </div>
        <Input label="Contact Number" required value={form.contact} onChange={e => set('contact', e.target.value)} placeholder="9800000000" />
        <Input label="Email" type="email" value={form.email} onChange={e => set('email', e.target.value)} placeholder="employee@ff.com" />
        <div className="flex justify-end space-x-3">
          <button onClick={onClose} className="px-4 py-2 text-sm font-medium text-gray-700 border border-gray-200 rounded-lg hover:bg-gray-50">Cancel</button>
          <button onClick={handleSubmit} className="px-4 py-2 text-sm font-medium text-white bg-black rounded-lg hover:bg-zinc-800">{editStaff ? 'Save Changes' : 'Add Employee'}</button>
        </div>
      </div>
    </Modal>
  );
};

const EODModal = ({ open, onClose }) => {
  const { state } = useApp();
  if (!open) return null;
  
  const todayStart = new Date();
  todayStart.setHours(0, 0, 0, 0);
  
  const todayOrders = state.orders.filter(o => new Date(o.time) >= todayStart);
  const totalRev = todayOrders.reduce((s, o) => s + o.total, 0);
  const totalGst = todayOrders.reduce((s, o) => s + o.gst, 0);
  
  const byMethod = todayOrders.reduce((acc, o) => {
    acc[o.method] = (acc[o.method] || 0) + o.total;
    return acc;
  }, {});

  const handlePrint = () => {
    const p = window.open('', '_blank');
    p.document.write(`
      <html>
      <head>
        <title>End of Day Report</title>
        <style>
          body { font-family: 'Courier New', Courier, monospace; padding: 20px; width: 300px; margin: 0 auto; color: #000; }
          h2 { text-align: center; margin-bottom: 5px; }
          p { margin: 2px 0; font-size: 12px; }
          .text-center { text-align: center; }
          .divider { border-bottom: 1px dashed #000; margin: 10px 0; }
          table { width: 100%; font-size: 12px; border-collapse: collapse; }
          td { padding: 4px 0; }
          .text-right { text-align: right; }
          .bold { font-weight: bold; }
        </style>
      </head>
      <body>
        <h2>${state.settings.cafeName || 'FlavourFall'}</h2>
        <p class="text-center bold">END OF DAY SHIFT REPORT</p>
        <div class="divider"></div>
        <p>Date: ${new Date().toLocaleDateString()}</p>
        <p>Time: ${new Date().toLocaleTimeString()}</p>
        <p>Generated by: ${state.settings.adminName?.split(' ')[0]}</p>
        <div class="divider"></div>
        <table>
          <tr><td>Total Orders</td><td class="text-right">${todayOrders.length}</td></tr>
          <tr><td>Total Sales</td><td class="text-right">Rs. ${totalRev}</td></tr>
          <tr><td>Total GST Collected</td><td class="text-right">Rs. ${totalGst}</td></tr>
        </table>
        <div class="divider"></div>
        <p class="bold">Payment Breakdown:</p>
        <table>
          ${Object.entries(byMethod).map(([m, val]) => `<tr><td>${m}</td><td class="text-right">Rs. ${val}</td></tr>`).join('')}
        </table>
        <div class="divider"></div>
        <p class="text-center mt-6">End of Report</p>
        <script>setTimeout(() => { window.print(); window.close(); }, 250);<\/script>
      </body>
      </html>
    `);
    p.document.close();
  };

  return (
    <Modal open={open} onClose={onClose} title="End of Day Closure" size="md">
      <div className="p-6">
        <div className="bg-zinc-50 border border-zinc-200 rounded-xl p-5 mb-6">
          <h3 className="text-sm font-bold text-gray-500 uppercase tracking-widest mb-4">Today's Summary</h3>
          <div className="grid grid-cols-2 gap-4">
            <div><p className="text-xs text-gray-500">Total Orders</p><p className="text-xl font-black text-black">{todayOrders.length}</p></div>
            <div><p className="text-xs text-gray-500">Total Revenue</p><p className="text-xl font-black text-black">₹{totalRev}</p></div>
            <div><p className="text-xs text-gray-500">Total GST</p><p className="text-xl font-black text-black">₹{totalGst}</p></div>
            <div><p className="text-xs text-gray-500">Cash in Drawer</p><p className="text-xl font-black text-black">₹{byMethod['Cash'] || 0}</p></div>
          </div>
        </div>
        <button onClick={handlePrint} className="w-full py-4 bg-black hover:bg-zinc-800 text-white rounded-xl font-black text-lg transition-colors flex items-center justify-center space-x-2">
          <Icon name="Printer" size={20} /><span>Print EOD Slip</span>
        </button>
      </div>
    </Modal>
  );
};

// ─── DEMO MODE ─────────────────────────────────────────────────────────────────
const DemoView = () => {
  const { state, dispatch, toast, notify } = useApp();
  const [confirmReset, setConfirmReset] = useState(false);
  const [busy, setBusy] = useState(null);

  const run = (key, fn, msg) => {
    setBusy(key);
    setTimeout(() => { fn(); toast(msg, 'success'); setBusy(null); }, 800);
  };

  const genOrders = (count) => {
    const orders = Array.from({ length: count }).map(() => {
      const menuSample = state.menuItems.filter(m=>m.available).slice(0, randomInt(2,5));
      const items = menuSample.map(m => ({ menuId:m.id, name:m.name, price:m.price, qty:randomInt(1,3) }));
      const subtotal = items.reduce((s,i) => s + i.price * i.qty, 0);
      const gst = Math.round(subtotal * 0.18);
      return { id: uid(), customer: randomFrom(DEMO_NAMES), customerId: '', items, subtotal, gst, total: subtotal+gst, status: randomFrom(ORDER_STATUSES), method: randomFrom(PAYMENT_METHODS), time: new Date(Date.now() - randomInt(0, 3600000)).toISOString(), note: '' };
    });
    dispatch({ type: 'BULK_ADD_ORDERS', payload: orders });
    notify('order', `${count} New Orders`, `Batch of ${count} demo orders generated`);
  };

  const genCustomers = () => {
    const firstNames = ['Aarav','Ishaan','Vivaan','Anaya','Diya','Sara','Aryan','Riya','Kabir','Naina'];
    const lastNames = ['Kumar','Sharma','Patel','Singh','Joshi','Mehta','Gupta','Rao','Verma','Iyer'];
    const customers = Array.from({ length: 10 }).map(() => ({
      id: 'c' + Date.now() + Math.random(),
      name: `${randomFrom(firstNames)} ${randomFrom(lastNames)}`,
      phone: `+91 98${randomInt(100,999)} ${randomInt(10000,99999)}`,
      email: '', visits: randomInt(1,20), spend: randomInt(500, 12000), points: randomInt(10, 600), tier:'Bronze', joinDate: new Date().toISOString().slice(0,10)
    }));
    dispatch({ type: 'BULK_ADD_CUSTOMERS', payload: customers });
  };

  const actions = [
    { key:'orders20',   icon:'ShoppingBag',  label:'Generate Today\'s Orders',  desc:'Creates 20 random orders', color:'from-zinc-900 to-black border border-zinc-800', fn: () => genOrders(20),  msg: '20 orders generated!' },
    { key:'rush',       icon:'Zap',          label:'Simulate Rush Hour',        desc:'Creates 50 orders — peak hour simulation', color:'from-zinc-800 to-zinc-900 border border-zinc-700', fn: () => genOrders(50), msg: '50 orders added!' },
    { key:'restock',    icon:'RefreshCw',    label:'Restock All Inventory',     desc:'Fills all ingredients to reorder levels', color:'from-zinc-700 to-zinc-800 border border-zinc-750', fn: () => dispatch({ type: 'RESTOCK_ALL' }), msg: 'Inventory restocked!' },
    { key:'customers',  icon:'Users',        label:'Generate Customers',        desc:'Adds 10 new customer profiles', color:'from-zinc-600 to-zinc-700 border border-zinc-650', fn: genCustomers,             msg: '10 customers added!' },
  ];

  return (
    <div className="space-y-6 animate-fade-in max-w-4xl">
      <div>
        <div className="inline-flex items-center space-x-2 px-3 py-1 bg-zinc-200 text-zinc-900 rounded-full text-xs font-bold mb-3">
          <Icon name="Sparkles" size={12} /><span>CLIENT DEMO MODE</span>
        </div>
        <h1 className="text-2xl font-black text-gray-900">Demo Controls</h1>
        <p className="text-gray-400 text-sm mt-1">Generate realistic data to showcase the full capabilities of FlavourFall to clients</p>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {actions.map(a => (
          <button key={a.key} onClick={() => run(a.key, a.fn, a.msg)} disabled={busy === a.key}
            className={`relative overflow-hidden text-left p-6 rounded-2xl bg-gradient-to-br ${a.color} text-white transition-all hover:scale-[1.02] hover:shadow-lg active:scale-[0.99] disabled:opacity-70 disabled:cursor-not-allowed`}>
            {busy === a.key && <div className="absolute inset-0 bg-black/10 flex items-center justify-center"><div className="w-6 h-6 border-2 border-white/50 border-t-white rounded-full animate-spin" /></div>}
            <div className="flex items-start space-x-4">
              <div className="p-2.5 bg-white/20 rounded-xl"><Icon name={a.icon} size={22} className="text-white" /></div>
              <div>
                <h4 className="font-bold text-white">{a.label}</h4>
                <p className="text-sm text-white/77 mt-1">{a.desc}</p>
              </div>
            </div>
          </button>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
        <h3 className="font-bold text-gray-900 mb-2">Current Data Summary</h3>
        <div className="grid grid-cols-3 md:grid-cols-5 gap-3">
          {[
            { label:'Orders',    val: state.orders.length },
            { label:'Menu Items', val: state.menuItems.length },
            { label:'Inventory', val: state.inventory.length },
            { label:'Customers', val: state.customers.length },

  return (

      {/* Logo */}
      <div className={`h-16 flex items-center px-4 border-b border-gray-800/60 ${collapsed ? 'justify-center' : ''}`}>
        <div className="w-9 h-9 bg-white text-zinc-950 rounded-xl flex items-center justify-center shrink-0 shadow-md border border-zinc-700">
          <Icon name="Coffee" size={20} className="text-black" />
        </div>
        {!collapsed && (
          <div className="ml-3 overflow-hidden">
            <p className="font-black text-base tracking-tight leading-none">{state.settings.cafeName}</p>
            <p className="text-[10px] text-zinc-400 font-semibold tracking-wider uppercase mt-0.5">{state.settings.tagline}</p>
          </div>
        )}
      </div>

      {/* Nav */}
      <nav className="flex-1 py-4 px-2 space-y-0.5 overflow-y-auto">
        {navItems.map(item => (
          <button key={item.tab} onClick={() => onNavigate(item.tab)}
            className={`sidebar-item relative w-full flex items-center rounded-xl px-3 py-2.5 text-left transition-all ${active === item.tab ? 'bg-white text-zinc-950 font-bold shadow-md border border-zinc-300' : 'text-gray-400 hover:bg-gray-800 hover:text-white'} ${collapsed ? 'justify-center' : 'space-x-3'}`}>
            <div className="relative shrink-0">
              <Icon name={item.icon} size={18} strokeWidth={active === item.tab ? 2.5 : 1.8} />
              {item.badge > 0 && (
                <span className={`absolute -top-1.5 -right-1.5 min-w-[16px] h-4 px-1 ${item.badgeColor || 'bg-black'} rounded-full text-[9px] font-black text-white flex items-center justify-center`}>{item.badge}</span>
              )}
            </div>
            {!collapsed && <span className="text-sm font-medium">{item.label}</span>}
          </button>
        ))}
      </nav>

      {/* Bottom */}
      <div className="p-2 border-t border-gray-800/60 space-y-0.5">
        <button onClick={() => onNavigate('Settings')} className={`sidebar-item w-full flex items-center rounded-xl px-3 py-2.5 transition-all ${active==='Settings' ? 'bg-white text-zinc-950 font-bold border border-zinc-300' : 'text-gray-400 hover:bg-gray-800 hover:text-white'} ${collapsed ? 'justify-center' : 'space-x-3'}`}>
          <Icon name="Settings" size={18} />
          {!collapsed && <span className="text-sm font-medium">Settings</span>}
        </button>
        {!collapsed && (
          <div className="flex items-center space-x-3 px-3 py-2 mt-1">
            <div className="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center shrink-0">
              <span className="text-xs font-bold text-white">{initials(state.settings.adminName)}</span>
            </div>
            <div className="min-w-0">
              <p className="text-xs font-semibold text-white truncate">{state.settings.adminName}</p>
              <p className="text-[10px] text-gray-500 truncate">Store Manager</p>
            </div>
          </div>
        )}
      </div>
    </aside>
  );
};

// ─── HEADER ────────────────────────────────────────────────────────────────────
const Header = ({ activeTab, onNavigate, sidebarCollapsed, onToggleSidebar }) => {
  const { state } = useApp();
  const [notifOpen, setNotifOpen] = useState(false);
  const unread = state.notifications.filter(n => !n.read).length;

  const tabTitles = {
    Dashboard: 'Dashboard', Orders: 'Order Management', Menu: 'Menu Management',
    Inventory: 'Inventory', Customers: 'Customers', Staff: 'Staff Management',
    Reports: 'Reports & Analytics', Settings: 'Settings', Demo: 'Demo Mode'
  };

  return (
    <header className="h-16 bg-white border-b border-gray-100 px-5 flex items-center justify-between z-10 shrink-0">
      <div className="flex items-center space-x-3">
        <button onClick={onToggleSidebar} className="p-1.5 rounded-lg hover:bg-gray-100 text-gray-500 transition-colors">
          <Icon name="Menu" size={20} />
        </button>
        <div className="hidden sm:flex items-center space-x-2 text-sm text-gray-500">
          <span className="text-gray-400">FlavourFall</span>
          <Icon name="ChevronRight" size={14} className="text-gray-300" />
          <span className="font-semibold text-gray-900">{tabTitles[activeTab]}</span>
        </div>
      </div>

      <div className="flex items-center space-x-3">
        <div className="hidden md:block">
          <GlobalSearch onNavigate={onNavigate} />
        </div>

        <div className="relative">
          <button onClick={() => setNotifOpen(!notifOpen)} className="relative p-2 rounded-xl bg-zinc-100 hover:bg-zinc-200 text-zinc-900 transition-colors">
            <Icon name="Bell" size={20} />
            {unread > 0 && (
              <span className="badge-pop absolute top-1 right-1 min-w-[16px] h-4 px-1 bg-black text-white text-[9px] font-black rounded-full flex items-center justify-center">{unread}</span>
            )}
          </button>
          <NotificationPanel open={notifOpen} onClose={() => setNotifOpen(false)} />
        </div>

        <div className="flex items-center space-x-2.5 pl-3 border-l border-gray-100">
          <div className="w-8 h-8 rounded-full bg-zinc-200 text-zinc-900 text-sm font-bold flex items-center justify-center shrink-0">{initials(state.settings.adminName)}</div>
          <div className="hidden sm:block">
            <p className="text-sm font-bold text-gray-800 leading-none">{state.settings.adminName}</p>
            <p className="text-[10px] text-gray-400 mt-0.5">Store Manager</p>
          </div>
        </div>
      </div>
    </header>
  );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [activeTab, setActiveTab] = useState(() => getLS('ff_tab', 'Dashboard'));
  const [collapsed, setCollapsed] = useState(() => getLS('ff_sidebar', false));

  const navigate = useCallback((tab) => {
    setActiveTab(tab);
    setLS('ff_tab', tab);
  }, []);

  const toggleSidebar = useCallback(() => {
    setCollapsed(c => { const next = !c; setLS('ff_sidebar', next); return next; });
  }, []);

  const renderContent = () => {
    switch (activeTab) {
      case 'Dashboard':  return <DashboardView onNavigate={navigate} />;
      case 'Orders':     return <OrdersView />;
      case 'Kitchen':    return <KitchenView />;
      case 'Menu':       return <MenuView />;
      case 'Inventory':  return <InventoryView />;
      case 'Customers':  return <CustomersView />;
      case 'Staff':      return <StaffView />;
      case 'Reports':    return <ReportsView />;
      case 'Settings':   return <SettingsView />;
      case 'Demo':       return <DemoView />;
      default:           return <DashboardView onNavigate={navigate} />;
    }
  };

  return (
    <AppProvider>
      <AppContent activeTab={activeTab} collapsed={collapsed} navigate={navigate} toggleSidebar={toggleSidebar} renderContent={renderContent} />
    </AppProvider>
  );
}

// Separate component to access context
function AppContent({ activeTab, collapsed, navigate, toggleSidebar, renderContent }) {
  return (
    <div className="flex h-screen bg-gray-50 overflow-hidden">
      <Sidebar active={activeTab} onNavigate={navigate} collapsed={collapsed} onToggle={toggleSidebar} />
      <main className="flex-1 flex flex-col overflow-hidden">
        <Header activeTab={activeTab} onNavigate={navigate} sidebarCollapsed={collapsed} onToggleSidebar={toggleSidebar} />
        <div className="flex-1 overflow-y-auto p-6">
          <div className="max-w-7xl mx-auto">
            {renderContent()}
          </div>
        </div>
      </main>
      <ToastContainer />
    </div>
  );
}

// Root render
try {
  const container = document.getElementById('root');
  const root = ReactDOM.createRoot(container);
  root.render(<App />);
} catch (err) {
  console.error('FlavourFall render error:', err);
  document.body.innerHTML = `<div style="font-family:sans-serif;padding:40px;text-align:center;color:#DC2626"><h2>Failed to load FlavourFall</h2><pre style="background:#FEF2F2;padding:12px;border-radius:8px;text-align:left;font-size:12px">${err?.stack || err}</pre></div>`;
}
</script>
</body>
</html>
